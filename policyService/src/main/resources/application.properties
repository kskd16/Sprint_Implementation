spring.application.name=policyService
server.port=8082

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/registry/eureka

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/Smart_Sure
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA Auditing
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=mysupersecretkeymysupersecretkey12345
jwt.expiration=3600000

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Scheduler
spring.task.scheduling.pool.size=5

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
