spring.application.name=apiGateway
server.port=8080

# ===================================================================
# EUREKA SERVICE DISCOVERY CONFIGURATION
# ===================================================================
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ===================================================================
# SPRING CLOUD GATEWAY CONFIGURATION
# ===================================================================
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Global CORS Configuration
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://localhost:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

# ===================================================================
# JWT SECURITY CONFIGURATION
# ===================================================================
jwt.secret=mysupersecretkeymysupersecretkey12345
jwt.expiration=3600000

# ===================================================================
# DISTRIBUTED CACHING - REDIS CONFIGURATION
# ===================================================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===================================================================
# DISTRIBUTED TRACING CONFIGURATION
# ===================================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===================================================================
# ACTUATOR ENDPOINTS CONFIGURATION
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ===================================================================
# CIRCUIT BREAKER CONFIGURATION
# ===================================================================
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=3

spring.main.web-application-type=reactive

# ===================================================================
# SERVICE ROUTING CONFIGURATION
# ===================================================================

# Route: Authentication Service
spring.cloud.gateway.server.webflux.routes[0].id=authService
spring.cloud.gateway.server.webflux.routes[0].uri=lb://authService
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**,/user/**

# Route: Policy Service
spring.cloud.gateway.server.webflux.routes[1].id=policyService
spring.cloud.gateway.server.webflux.routes[1].uri=lb://policyService
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/policies/**,/api/policy-types/**

# Route: Claim Service
spring.cloud.gateway.server.webflux.routes[2].id=claimService
spring.cloud.gateway.server.webflux.routes[2].uri=lb://claimService
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/claims/**

# Route: Admin Service
spring.cloud.gateway.server.webflux.routes[3].id=adminService
spring.cloud.gateway.server.webflux.routes[3].uri=lb://adminService
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/admin/**

# Route: Payment Service
spring.cloud.gateway.server.webflux.routes[4].id=paymentService
spring.cloud.gateway.server.webflux.routes[4].uri=lb://paymentService
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/payments/**

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG
logging.level.com.smartSure.apiGateway=INFO
logging.level.reactor.netty=INFO